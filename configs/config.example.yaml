app:
  name: "화보 드라마 API"
  version: "1.0.0"
  debug: true
  language: "ko" # 시스템 언어: ko(한국어) / zh(중국어) / en(영어)

server:
  port: 5679
  host: "0.0.0.0"
  cors_origins:
    - "http://localhost:3013"
  read_timeout: 600
  write_timeout: 600

database:
  type: "sqlite"
  path: "./data/huobao_drama.db"
  max_idle: 10
  max_open: 100

storage:
  type: "local"
  local_path: "./data/storage"
  base_url: "http://localhost:5679/static"

ai:
  default_text_provider: "openai"
  default_image_provider: "openai"
  default_video_provider: "doubao"
